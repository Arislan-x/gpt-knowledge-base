<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPT Knowledge Base</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <section class="operation-section" aria-label="Backup controls">
        <header class="topbar">
          <div class="brand-block">
            <img class="brand-icon" src="../assets/gpt-knowledge-base-icon.svg" alt="" aria-hidden="true">
            <div>
              <p id="appKicker" class="app-kicker">Unify AI conversations into a RAG knowledge base</p>
              <h1 id="appTitle">GPT Knowledge Base</h1>
            </div>
          </div>
          <div class="topbar-tools">
            <div class="topbar-side">
              <p id="statusText">Loading backups</p>
              <p id="summaryText" class="summary-text">0 conversations, 0 messages</p>
            </div>
            <div class="settings-toolbar" aria-label="Interface settings">
              <label class="icon-select" title="Language">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                <span id="languageLabel" class="sr-only">Language</span>
                <select id="languageSelect"></select>
              </label>
              <label class="icon-select" title="Font">
                <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
                <span id="fontLabel" class="sr-only">Font</span>
                <select id="fontSelect"></select>
              </label>
              <label class="icon-select" title="Theme">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.2 2 11.4 2 15.7 5.4 20 10 20h1.6c1.1 0 1.8-.9 1.6-1.9-.1-.5-.2-.9-.2-1.2 0-1.1.9-1.9 2-1.9h1.6c3.1 0 5.4-2.5 5.4-5.5C22 5.4 17.5 2 12 2Z"/></svg>
                <span id="themeLabel" class="sr-only">Theme</span>
                <select id="themeSelect"></select>
              </label>
            </div>
          </div>
        </header>

        <div class="controls">
          <div id="captureCard" class="capture-card">
            <label class="capture-toggle">
              <span class="capture-copy">
                <span id="backupSwitchLabel">Live backup</span>
                <small id="captureStatus">On</small>
              </span>
              <input id="captureToggle" type="checkbox" role="switch" checked>
              <span class="switch-track" aria-hidden="true"></span>
            </label>
            <p id="localPrivacyNote" class="sr-only">Only the currently open conversation is backed up. Data stays local.</p>
          </div>
          <button id="openVaultButton" class="primary wide-button" type="button">Open Workstation</button>
          <div class="button-row">
            <button id="exportJsonButton" type="button">JSON</button>
            <button id="exportMarkdownButton" type="button">MD</button>
            <button id="exportHtmlButton" type="button">HTML</button>
          </div>
          <section class="detail-section current-page-section" aria-label="Current page backup">
            <article id="detailPanel" class="detail-panel" hidden></article>
          </section>
          <section id="supportedStrip" class="supported-strip" aria-labelledby="supportedPlatformsTitle">
            <h2 id="supportedPlatformsTitle" class="sr-only">Supported GPTs</h2>
            <p id="trademarkNotice" class="sr-only">Names and logos are used only as nominative links; trademarks belong to their owners.</p>
            <div id="supportedIconList" class="supported-icons" aria-label="Supported GPT official links"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="preferences.js"></script>
    <script src="export-html.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
